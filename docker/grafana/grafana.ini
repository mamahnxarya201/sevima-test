[paths]
provisioning = /etc/grafana/provisioning

[server]
http_port = 3000

[security]
allow_embedding = true
cookie_samesite = lax

[panels]
disable_sanitize_html = true

[auth]
disable_login_form = true

[auth.anonymous]
enabled = true
org_role = Viewer

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/global-health.json

[auth.jwt]
enabled = true
url_login = true
auto_sign_up = true
username_claim = email
email_claim = email
# Grafana requires HTTPS for jwk_set_url; use a file populated at container start (see entrypoint.sh).
jwk_set_file = /var/lib/grafana/jwks.json
expect_claims = {"iss":"http://localhost:3000","aud":"http://localhost:3000"}
role_attribute_path = role == 'ADMIN' && 'Admin' || role == 'EDITOR' && 'Editor' || 'Viewer'
