services:
  # ── PostgreSQL (management + default tenant DB) ──────────────
  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-management_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/pg-init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=management_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-management_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Next.js application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      MANAGEMENT_DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-management_db}
      TENANT_DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/default_tenant_db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Docker-in-Docker: the socket is mounted from the host
      DOCKER_HOST: unix:///var/run/docker.sock
      # Loki push endpoint for execution logs
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    volumes:
      # Host container runtime socket → inside app container
      - ${DOCKER_HOST_PATH:-/run/user/1000/podman/podman.sock}:/var/run/docker.sock:z
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Loki (log aggregation) ──────────────────────────────────
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki/data
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      JWKS_HTTP_URL: http://app:3000/api/auth/jwks
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./docker/grafana/custom.css:/etc/grafana/custom.css:ro
      - ./docker/grafana/entrypoint.sh:/entrypoint-grafana.sh:ro
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    entrypoint: ["/bin/sh", "/entrypoint-grafana.sh"]
    depends_on:
      app:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  loki_data:
