services:
  orchestrator-node:
    image: node:20-alpine
    container_name: orchestrator_node
    restart: unless-stopped
    volumes:
      - .:/app:z
      - ${DOCKER_HOST_PATH:-/run/user/1000/podman/podman.sock}:/var/run/docker.sock:z
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Use internal docker hostname "db" inside the container
      - MANAGEMENT_DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-management_db}
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-management_db}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    security_opt:
      - label:disable
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-management_db}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data:z
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-management_db}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
